name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller ^
            --name "й ҳжЁҷйӣ·йҒ”" ^
            --add-data "frontend/dist;frontend" ^
            --add-data "backend;backend" ^
            --hidden-import backend.main ^
            --hidden-import backend.routers.tenders ^
            --hidden-import backend.services.pcc_api ^
            --hidden-import backend.models.tender ^
            --hidden-import backend.schemas.tender ^
            --hidden-import backend.database ^
            --hidden-import sqlalchemy ^
            --hidden-import fastapi ^
            --hidden-import uvicorn ^
            --hidden-import httpx ^
            --hidden-import apscheduler ^
            --hidden-import pydantic ^
            --hidden-import pydantic_settings ^
            --console=False ^
            --onefile ^
            --clean ^
            packaging/gui.py

      - name: Create ZIP
        run: |
          mkdir -p dist
          Compress-Archive -Path "dist/й ҳжЁҷйӣ·йҒ”/*" -DestinationPath "dist/й ҳжЁҷйӣ·йҒ”-Windows.zip"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: bidding-radar-win
          path: dist/й ҳжЁҷйӣ·йҒ”-Windows.zip
          retention-days: 30
