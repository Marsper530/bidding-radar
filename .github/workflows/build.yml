name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Build with PyInstaller
        run: |
          $spec = @'
          # -*- mode: python ; coding: utf-8 -*-
          import sys, os
          from PyInstaller.building.build_main import Analysis, PYZ, EXE
          from PyInstaller.building.datastruct import Tree
          block_cipher = None
          a = Analysis(
              ['packaging/gui.py'],
              pathex=[],
              binaries=[],
              datas=[
                  ('frontend/dist', 'frontend'),
                  ('backend', 'backend'),
              ],
              hiddenimports=[
                  'backend.main', 'backend.routers.tenders',
                  'backend.services.pcc_api', 'backend.models.tender',
                  'backend.schemas.tender', 'backend.database',
                  'sqlalchemy', 'fastapi', 'uvicorn', 'httpx',
                  'apscheduler', 'pydantic', 'pydantic_settings',
              ],
              hookspath=[],
              excludes=[],
              cipher=block_cipher,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
          exe = EXE(pyz, a.scripts, [], exclude_binaries=True,
                    name='й ҳжЁҷйӣ·йҒ”', debug=False, strip=False, upx=True, console=False)
          coll = COLLECT(exe, a.binaries, a.zipfiles, a.datas,
                         strip=False, upx=True, name='й ҳжЁҷйӣ·йҒ”')
          '@
          $spec | Out-File -FilePath "bidding-radar-build.spec" -Encoding utf8
          python -m PyInstaller --noconfirm bidding-radar-build.spec

      - name: Create ZIP
        run: |
          mkdir -p dist
          Compress-Archive -Path "backend/dist/й ҳжЁҷйӣ·йҒ”/*" -DestinationPath "dist/й ҳжЁҷйӣ·йҒ”-Windows.zip"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: bidding-radar-win
          path: dist/й ҳжЁҷйӣ·йҒ”-Windows.zip
          retention-days: 30
