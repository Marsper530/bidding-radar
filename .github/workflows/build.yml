name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        shell: bash
        run: pip install -r backend/requirements.txt

      - name: Build with Python + PyInstaller
        shell: bash
        run: python build.py

      - name: Show build output
        shell: bash
        run: |
          ls -la backend/dist/ 2>/dev/null || echo "dist not found"
          find backend -name "*.exe" 2>/dev/null

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: bidding-radar-exe
          path: backend/dist/BiddingRadar.exe
          retention-days: 30
