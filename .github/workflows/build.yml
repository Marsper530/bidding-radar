name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        shell: bash
        run: pip install -r backend/requirements.txt

      - name: Build with Python + PyInstaller
        shell: bash
        run: python build.py

      - name: Create dist folder and ZIP
        shell: bash
        run: |
          mkdir -p dist
          if [ -d "backend/dist" ]; then
            powershell -Command "Compress-Archive -Path 'backend/dist/й ҳжЁҷйӣ·йҒ”/*' -DestinationPath 'dist/й ҳжЁҷйӣ·йҒ”-Windows.zip' -Force"
          fi

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: bidding-radar-win
          path: dist/й ҳжЁҷйӣ·йҒ”-Windows.zip
          retention-days: 30
