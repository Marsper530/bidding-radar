name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          cd backend
          python -m PyInstaller --noconfirm packaging/bidding-radar.spec
          Compress-Archive -Path "dist/й ҳжЁҷйӣ·йҒ”/*" -DestinationPath "dist/й ҳжЁҷйӣ·йҒ”-Windows.zip"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: bidding-radar-win
          path: backend/dist/й ҳжЁҷйӣ·йҒ”-Windows.zip
          retention-days: 30
